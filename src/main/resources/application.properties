spring.application.name=v2x-tools-engine
server.port=${PORT:8090}
# Bind to the IPv6 wildcard so Railway private networking (*.railway.internal, IPv6-only
# service-to-service) can reach the engine. '::' accepts IPv4-mapped too, so the public
# proxy keeps working. Without this Tomcat binds 0.0.0.0 (IPv4) and the backend can't connect.
server.address=::
